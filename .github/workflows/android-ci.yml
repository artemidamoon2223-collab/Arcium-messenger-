name: Android CI

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ubuntu-latest ships with Android SDK including platforms;android-34
      # and build-tools;34.0.0. compileSdk=34 requires no extra installation.
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # Generate UniFFI Kotlin + native bridge inputs into the Gradle build dir
      # BEFORE compiling production Kotlin, so any future production reference to
      # uniffi.arcium_core.* resolves. Shared source of truth (no duplicated logic).
      - name: Generate UniFFI Kotlin + native bridge inputs
        uses: ./.github/actions/uniffi-android-bridge

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: build
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3

      - name: Post build error to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build.log', 'utf8');
            const lines = log.split('\n');
            const errors = lines
              .filter(l => /^e:|error:|FAILURE:|Caused by:|Unresolved|> Task|SDK location/.test(l))
              .slice(0, 40)
              .join('\n');
            const tail = lines.slice(-30).join('\n');
            const body = `## ≡ا¤┤ Android CI ظ¤ Build Failure\n\n**Errors:**\n\`\`\`\n${errors || '(none matched)'}\n\`\`\`\n\n**Last 30 lines:**\n\`\`\`\n${tail}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: arcium-messenger-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
