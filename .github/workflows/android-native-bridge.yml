name: Android Native Bridge (x86_64)

on:
  push:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'android/app/build.gradle.kts'
      - '.github/workflows/android-native-bridge.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'android/app/build.gradle.kts'
      - '.github/workflows/android-native-bridge.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge-compile-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Generate UniFFI Kotlin + native bridge inputs
        uses: ./.github/actions/uniffi-android-bridge

      - name: Assert generated bridge inputs are present before Gradle
        shell: bash
        run: |
          set -euo pipefail
          test -f android/app/build/generated/rustBridge/kotlin/uniffi/arcium_core/arcium_core.kt
          test -s android/app/build/generated/rustBridge/jniLibs/x86_64/libarcium_core.so
          echo "BRIDGE_INPUTS_ASSERT=PASS"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble debug APK (compiles generated Kotlin, packages .so)
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Verify libarcium_core.so is packaged into the debug APK
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/debug -name '*.apk' -print -quit)"
          test -n "${APK}"
          echo "APK=${APK}"
          if unzip -l "${APK}" | grep -E 'lib/x86_64/libarcium_core\.so'; then
            echo "APK_CONTAINS_NATIVE_LIB=PASS"
          else
            echo "APK_CONTAINS_NATIVE_LIB=FAIL — libarcium_core.so not packaged" >&2
            unzip -l "${APK}" | grep -E 'lib/' || true
            exit 80
          fi
