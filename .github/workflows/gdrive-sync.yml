name: Sync to Google Drive

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create ZIP archive
        run: |
          zip -r Arcium-messenger-$(date +%Y-%m-%d).zip . \
            -x ".git/*" ".github/*" "node_modules/*" "target/*" ".env*"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Google Drive
        env:
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_TOKEN:         ${{ secrets.GDRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          client_id = ${GDRIVE_CLIENT_ID}
          client_secret = ${GDRIVE_CLIENT_SECRET}
          token = ${GDRIVE_TOKEN}
          scope = drive.file
          EOF

      - name: Upload ZIP to Google Drive
        run: |
          ZIP=$(ls Arcium-messenger-*.zip | head -n1)
          rclone copy "$ZIP" gdrive:Arcium-messenger-Backups/ --drive-use-trash=false
          echo "✅ Uploaded $ZIP to Google Drive folder: Arcium-messenger-Backups"

      - name: Verify upload
        run: |
          echo "Files in Google Drive folder:"
          rclone ls gdrive:Arcium-messenger-Backups/
