name: Karpathy Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  karpathy-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Karpathy Analysis
        id: claude_run
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Get the PR diff:
              git diff origin/${{ github.base_ref }}...HEAD

            Review every changed file against Andrej Karpathy's 4 principles
            (https://github.com/forrestchang/andrej-karpathy-skills).

            Score each principle: ✅ Pass | ⚠️ Warning | ❌ Fail — one sentence of evidence.

            1. **Think Before Coding** — every choice traces to a real requirement;
               no speculation, no silent assumptions.
            2. **Simplicity First** — minimum code that solves the stated problem;
               no speculative features, unnecessary abstractions, or impossible-case
               error handling.
            3. **Surgical Changes** — only the requested lines were touched;
               no "while I'm here" formatting, refactoring, or adjacent cleanup.
            4. **Goal-Driven** — the change is verifiable:
               tests added/updated, `cargo test` / `tsc --noEmit` stays green.

            Finish with a 1-2 sentence overall verdict.

            Post the result as a comment on this PR.

      - name: Fail if review did not run
        if: always()
        run: |
          # karpathy-review is a real gate — this step fails the job if the review
          # did not run successfully (e.g. missing/expired key); a swallowed error can no longer
          # show a false green.
          if [ "${{ steps.claude_run.outcome }}" != "success" ] || [ "${CLAUDE_SUCCESS:-}" = "false" ]; then
            echo "::error::Karpathy review did not run successfully (step outcome=${{ steps.claude_run.outcome }}, CLAUDE_SUCCESS=${CLAUDE_SUCCESS:-unset}). Renew ANTHROPIC_API_KEY — do NOT add continue-on-error."
            exit 1
          fi
          echo "Karpathy review ran successfully."
