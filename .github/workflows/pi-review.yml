name: Pi × Claude Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  pi-claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Install pi agent
        # Pinned to exact published version (was unversioned; resolved from npm on 2026-07-02).
        run: npm install -g @earendil-works/pi-coding-agent@0.80.3

      - name: Run Pi × Claude Review
        id: pi_run
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PI_TELEMETRY: '0'
          PI_SKIP_VERSION_CHECK: '1'
        run: |
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          Review this PR diff for Arcium Messenger — anonymous E2E messenger: Tor + X3DH/Double Ratchet + XChaCha20-SQLite + Arcium MPC/PSI.

          Apply Karpathy 4 principles:
          1. Think Before Coding — real facts, not guesses?
          2. Simplicity First — minimal code?
          3. Surgical Changes — only what was asked?
          4. Goal-Driven — verifiable test/check exists?

          Security: crypto correctness, key zeroization, timing attacks.
          CRITICAL: never XChaCha20 for PSI, never RescueCipher for messages.

          Format: markdown, max 400 words. Lead with verdict (✅ / ⚠️ / ❌).

          == PR DIFF ==
          PROMPT_EOF

          git diff origin/${{ github.base_ref }}...HEAD | head -500 >> /tmp/prompt.txt

          pi \
            --provider anthropic \
            --model claude-haiku-4-5-20251001 \
            --tools read,grep,find \
            --no-session \
            --no-extensions \
            --no-skills \
            -p "$(cat /tmp/prompt.txt)" > /tmp/pi-review.md 2>&1

      - name: Fail if review did not run
        if: always()
        run: |
          if [ "${{ steps.pi_run.outcome }}" != "success" ]; then
            echo "::error::Pi review failed (outcome=${{ steps.pi_run.outcome }}). Check ANTHROPIC_API_KEY secret."
            exit 1
          fi
          if [ ! -s /tmp/pi-review.md ]; then
            echo "::error::Pi review produced empty output. Check ANTHROPIC_API_KEY."
            exit 1
          fi
          echo "Pi × Claude review completed."

      - name: Post review comment
        if: steps.pi_run.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/pi-review.md', 'utf8').trim();
            if (!review) { core.warning('Empty review — skipping'); return; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Pi × Claude Haiku Review',
                '',
                review,
                '',
                '---',
                '_Powered by [pi agent](https://pi.dev) + Claude Haiku_'
              ].join('\n')
            });
